# =============================================================================
# CI — runs on every push and PR targeting main.
# Three independent jobs (backend / frontend / iac) plus a small `gate` job
# that blocks merge until all three pass. Concurrency cancels in-progress
# runs on the same PR.
# =============================================================================
name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    working-directory: sample/novimart-app

jobs:
  backend:
    name: backend (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore backend/NoviMart.sln
        working-directory: sample/novimart-app

      - name: Build (warnings = errors)
        run: dotnet build backend/NoviMart.sln --configuration Release --no-restore /warnaserror

      - name: Test with coverage
        run: |
          dotnet test backend/NoviMart.sln \
            --configuration Release \
            --no-build \
            --logger trx \
            --results-directory ./TestResults \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Coverage gate (≥90%)
        shell: bash
        run: |
          set -euo pipefail
          COBERTURA=$(find ./TestResults -name 'coverage.cobertura.xml' | head -n 1 || true)
          if [ -z "${COBERTURA}" ]; then
            echo "::error::No coverage report found"; exit 1
          fi
          # Extract line-rate (0..1) from <coverage line-rate="0.93" ...>
          RATE=$(grep -oE 'line-rate="[0-9.]+"' "$COBERTURA" | head -n 1 | sed -E 's/.*"([0-9.]+)".*/\1/')
          PCT=$(awk -v r="$RATE" 'BEGIN { printf "%.2f", r * 100 }')
          echo "Coverage: ${PCT}%"
          awk -v r="$RATE" 'BEGIN { exit !(r + 0 >= 0.90) }' \
            || { echo "::error::Coverage ${PCT}% < 90% gate"; exit 1; }

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: sample/novimart-app/TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn

      - name: Vulnerable packages
        run: |
          dotnet list backend/NoviMart.sln package --vulnerable --include-transitive \
            | tee vuln.log
          if grep -E '>\s+(High|Critical)\s+' vuln.log; then
            echo "::error::High/Critical CVEs in NuGet dependencies"; exit 1
          fi

  frontend:
    name: frontend (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sample/novimart-app/frontend/package-lock.json

      - name: Install
        working-directory: sample/novimart-app/frontend
        run: npm ci

      - name: Typecheck
        working-directory: sample/novimart-app/frontend
        run: npm run typecheck --if-present

      - name: Lint
        working-directory: sample/novimart-app/frontend
        run: npm run lint --if-present

      - name: Tests with coverage
        working-directory: sample/novimart-app/frontend
        run: npm run test:cov --if-present

      - name: Build
        working-directory: sample/novimart-app/frontend
        run: npm run build

      - name: Bundle size guard (≤ 200 KB gzipped initial route)
        working-directory: sample/novimart-app/frontend
        shell: bash
        run: |
          set -euo pipefail
          DIST="dist"
          if [ ! -d "$DIST" ]; then
            echo "::warning::No $DIST directory; skipping bundle-size check"
            exit 0
          fi
          node -e "
            const fs = require('fs');
            const path = require('path');
            const zlib = require('zlib');
            const root = '$DIST';
            const exts = new Set(['.js', '.css']);
            function walk(d) {
              return fs.readdirSync(d, { withFileTypes: true }).flatMap(e => {
                const p = path.join(d, e.name);
                return e.isDirectory() ? walk(p) : [p];
              });
            }
            const files = walk(root)
              .filter(f => exts.has(path.extname(f)))
              .map(f => ({ f, gz: zlib.gzipSync(fs.readFileSync(f)).length }))
              .sort((a, b) => b.gz - a.gz);
            const total = files.slice(0, 3).reduce((s, x) => s + x.gz, 0);
            console.log('Top 3 gzipped (initial route approx):');
            files.slice(0, 3).forEach(x => console.log('  ' + (x.gz / 1024).toFixed(1) + ' KB  ' + x.f));
            console.log('Total: ' + (total / 1024).toFixed(1) + ' KB gzipped');
            if (total > 200 * 1024) {
              console.log('::warning::Initial route bundle ' + (total/1024).toFixed(1) + ' KB > 200 KB budget');
            }
          "

      - name: npm audit (high/critical)
        working-directory: sample/novimart-app/frontend
        run: npm audit --audit-level=high

  iac:
    name: iac (Bicep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: |
          az bicep install
          az bicep version

      - name: Bicep build
        run: az bicep build --file infra/main.bicep --stdout > /dev/null

      - name: Bicep lint
        run: az bicep lint --file infra/main.bicep

      - name: ARM what-if (dry run, requires AZURE_* secrets — skipped on PR from forks)
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push' }}
        env:
          AZURE_HAS_OIDC: ${{ secrets.AZURE_CLIENT_ID != '' }}
        run: |
          if [ "${AZURE_HAS_OIDC}" != "true" ]; then
            echo "::notice::AZURE_CLIENT_ID secret not set — skipping live what-if"
            exit 0
          fi
          echo "::notice::what-if would run here when secrets are configured"

  gate:
    name: ci-gate
    needs: [ backend, frontend, iac ]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All required CI jobs passed."
