name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test

      # Prove the published tarball is installable + functional
      - name: Pack and smoke-test
        run: |
          npm pack
          TGZ=$(ls pakbaz-specfleet-*.tgz)
          mkdir -p /tmp/specfleet-smoke && cd /tmp/specfleet-smoke
          npm init -y >/dev/null
          npm install --no-audit --no-fund "$GITHUB_WORKSPACE/$TGZ"
          mkdir target && cd target
          ../node_modules/.bin/specfleet --version
          ../node_modules/.bin/specfleet init --non-interactive
          test -d .specfleet/charters
          test -d .specfleet/policies
          test -f .specfleet/instruction.md
          # v0.4 surface: simplified commands respond
          ../node_modules/.bin/specfleet mcp serve --help
          ../node_modules/.bin/specfleet check --help
          ../node_modules/.bin/specfleet log --help
          ../node_modules/.bin/specfleet config --help
          ../node_modules/.bin/specfleet spec new smoke-spec
          test -f .specfleet/specs/smoke-spec.spec.md
          ../node_modules/.bin/specfleet check --audit
          # v0.2 compliance packs ship
          test -d .specfleet/policies/packs/soc2
          test -d .specfleet/policies/packs/hipaa
          test -d .specfleet/policies/packs/pci-dss
          test -d .specfleet/policies/packs/iso27001
          test -d .specfleet/policies/packs/gdpr
          # Air-gap: the CLI must boot with SPECFLEET_OFFLINE=1
          SPECFLEET_OFFLINE=1 ../node_modules/.bin/specfleet --version
          SPECFLEET_OFFLINE=1 ../node_modules/.bin/specfleet check || true
