name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish --dry-run only"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # required for npm OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # NOTE: do NOT set registry-url here. setup-node would write
          # //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN} into .npmrc,
          # and an empty NODE_AUTH_TOKEN defeats OIDC trusted-publisher auth.
          # npm 11.5.1+ will auth via OIDC automatically when no token is set.

      # OIDC trusted publishing requires npm >= 11.5.1
      - name: Upgrade npm to a version that supports OIDC publishing
        run: npm install -g npm@latest

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Verify tag matches package.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: npm publish --dry-run --access public --provenance

      - name: Check if version already published
        id: check
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: |
          PKG=$(node -p "require('./package.json').version")
          if npm view "@pakbaz/eas@${PKG}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::@pakbaz/eas@${PKG} is already on npm — skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npmjs.com (OIDC trusted publisher)
        if: (startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)) && steps.check.outputs.already_published != 'true'
        run: npm publish --access public --provenance
